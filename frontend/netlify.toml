## Netlify configuration for Milo frontend
## Builds Vite app and proxies /api/* to Cloud Run backend to avoid CORS.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://milo-backend-6nd5znx3uq-el.a.run.app/api/:splat"
  status = 200
  force = true
